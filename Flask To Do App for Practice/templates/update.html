{% extends 'base.html' %}

{% block body %}
<div class="container my-3">
    <h2>Update a To-Do</h2>
    <form action="/update/{{ todo.sno }}" method="POST">
        <div class="mb-3">
            <label for="title" class="form-label">To-Do Title</label>
            <input type="text" class="form-control" name="title" value="{{ todo.title }}" id="title" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
            <label for="desc" class="form-label">To-Do Description</label>
            <input type="text" class="form-control" name="desc" value="{{ todo.desc }}" id="desc">
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
{% endblock body %}
